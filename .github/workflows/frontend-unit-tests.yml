name: Test - Vitest | Frontend Unit Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-view
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
