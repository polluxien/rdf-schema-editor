# Extends docker-compose.yml for the RDF export feature.
# Docker Compose merges this file automatically alongside docker-compose.yml.
#
# Required additions when running the full stack via docker-compose:
#   - Docker socket  : lets the backend spawn/manage the rdf-transform container
#   - BiodivPipeline : the directory that contains the rdf_transform Dockerfile
#   - BIODIVPIPELINE_DIR env var: tells the backend service where the dir is mounted

services:
  backend:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./BiodivPipeline:/app/BiodivPipeline:ro
    environment:
      BIODIVPIPELINE_DIR: /app/BiodivPipeline
