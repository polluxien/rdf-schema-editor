services:
  frontend:
    image: rse-frontend
    build:
      context: .
      dockerfile: web-view/Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: rse-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/rse
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: schlüssel
      JWT_TTL: 300
    ports:
      - "4000:4000"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    volumes:
      - mongodb-data:/data/db
    ports:
      - "27017:27017"
    restart: always

volumes:
  mongodb-data: